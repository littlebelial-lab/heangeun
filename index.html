<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PORTFOLIO</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="hero hero-image" id="home" aria-label="Portfolio homepage">
        <canvas id="moon-canvas" class="moon-canvas" aria-hidden="true"></canvas>
        <canvas id="particle-field" class="particle-field" aria-hidden="true"></canvas>

        <header class="topbar">
          <a class="mark" href="#home" aria-label="Portfolio home"></a>
          <nav class="main-nav" aria-label="Primary navigation">
            <a class="active" href="#works">精选案例</a>
            <a href="#home">作品集</a>
            <a href="#about">关于我</a>
          </nav>
          <a class="talk" href="#contact">联系我 <span>&nearr;</span></a>
        </header>

        <aside class="hero-side">
          <p>MULTI-DISCIPLINE DESIGNER</p>
          <span></span>
          <a href="#works">View Works <b>&nearr;</b></a>
        </aside>

        <h1 class="portfolio-title" aria-label="PORTFOLIO">PORTFOLIO</h1>

        <div class="orbit" aria-label="Capability orbit">
          <svg viewBox="0 0 660 500" aria-hidden="true">
            <circle cx="330" cy="250" r="244"></circle>
            <circle cx="330" cy="250" r="124"></circle>
            <polygon points="330,34 548,156 548,344 330,466 112,344 112,156"></polygon>
            <line x1="330" y1="34" x2="330" y2="466"></line>
            <line x1="112" y1="156" x2="548" y2="344"></line>
            <line x1="112" y1="344" x2="548" y2="156"></line>
          </svg>
          <button class="cap cap-strategy" type="button" data-icon="◎">策略</button>
          <button class="cap cap-product" type="button" data-icon="□">产品</button>
          <button class="cap cap-visual" type="button" data-icon="◉">视觉</button>
          <button class="cap cap-motion" type="button" data-icon="▷">动效</button>
          <button class="cap cap-brand" type="button" data-icon="◇">品牌</button>
          <button class="cap cap-ai" type="button" data-icon="✦">AI</button>
        </div>

        <div class="hero-footer">
          <span class="scroll-label">SCROLL</span>
          <a href="#works">精选案例</a>
          <span class="arrow">&darr;</span>
        </div>
      </section>

      <section class="works" id="works" aria-label="Featured projects">
        <div class="section-copy">
          <p>FEATURED PROJECTS</p>
          <h2>Selected works in motion.</h2>
          <span>Product, brand, visual and AI interaction projects.</span>
        </div>

        <div class="showcase-panel" aria-label="Image project board">
          <div class="showcase-bar">
            <span>CAMPIONE</span>
            <span>Menu</span>
          </div>
          <div class="photo-tile tile-main"></div>
          <div class="photo-tile tile-left"></div>
          <div class="photo-tile tile-top"></div>
          <div class="photo-tile tile-right"></div>
          <div class="photo-tile tile-bottom"></div>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
